fragment SiteMetaConfig on SiteMetaConfig {
  documentId
  siteName
  siteUrl
  pageTitleTemplate
  defaultMetaTitle
  defaultMetaDescription
  indexable
  legalName
  phoneNumber
  email
  addressLine
  city
  postalCode
  mapLocation
  defaultImage {
    url
    alternativeText
    width
    height
  }
  socialLinks {
    documentId
    socialNetworkName
    url
  }
}

query GetSiteMetaConfig {
  siteMetaConfig {
    ...SiteMetaConfig
  }
}
