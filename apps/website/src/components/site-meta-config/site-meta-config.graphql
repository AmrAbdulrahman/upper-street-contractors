fragment SiteMetaConfig on SiteMetaConfig {
  id
  siteName
  siteUrl
  pageTitleTemplate
  defaultMetaTitle
  defaultMetaDescription
  indexable
  legalName
  phoneNumber
  email
  addressLine
  city
  postalCode
  mapLocation
  defaultImage {
    url
    alt
    width
    height
  }
  socialLinks {
    id
    socialNetworkName
    url
  }
}

query GetSiteMetaConfig($status: CmsReadStatus = published, $includeUnpublished: Boolean) {
  siteMetaConfigs(pagination: { limit: 1 }, status: $status, includeUnpublished: $includeUnpublished) {
    ...SiteMetaConfig
  }
}
