query GetWhoWeAreSectionById($id: String!, $preview: Boolean = false) {
  whoWeAreSection(id: $id, preview: $preview) {
    ...WhoWeAreSection
  }
}

fragment WhoWeAreSection on WhoWeAreSection {
  _id
  __typename
  sys {
    id
  }
  overline
  title
  body {
    json
  }
  imageContainer {
    ...ImageContainer
  }
  buttonsCollection(preview: $preview) {
    items {
      ...Button
    }
  }
}
