#import "../../components/ui/project-card/project-card.graphql"

query GetProjectCard($id: String!, $status: PublicationStatus = false) {
  projectCard(id: $id, status: $status) {
    ...ProjectCard
  }
}

query GetProjectCardIds {
  projectCardCollection(limit: 100) {
    items {
      sys {
        id
      }
    }
  }
}
