#import "../../components/ui/project-card/project-card.graphql"

query GetProjectCard($documentId: ID!, $status: PublicationStatus = PUBLISHED) {
  projectCard(documentId: $documentId, status: $status) {
    ...ProjectCard
  }
}

query GetProjectCardIds {
  projectCards(pagination: { limit: 100 }) {
    documentId
  }
}
