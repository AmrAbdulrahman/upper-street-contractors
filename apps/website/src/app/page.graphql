query GetHomePage($status: PublicationStatus = false) {
  pageCollection(limit: 1, status: $status, where: { key: "home" }) {
    items {
      _id
      __typename
      sys {
        id
      }
      title
      description
      meta {
        ...PageMetadata
      }
      sectionsCollection(limit: 10, status: $status) {
        items {
          ... on HomeHeaderSection {
            ...HomeHeroSection
          }
          ... on AccreditationList {
            ...AccreditationList
          }
          ... on WhoWeAreSection {
            ...WhoWeAreSection
          }
          ... on WhatWeDoSection {
            ...WhatWeDoSection
          }
          ... on WhyChooseUsSection {
            ...WhyChooseUsSection
          }
          ... on HowItWorksSection {
            ...HowItWorksSection
          }
          ... on RecentWorkSection {
            ...RecentWorkSection
          }
        }
      }
    }
  }
}