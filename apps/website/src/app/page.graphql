query GetHomePage($status: PublicationStatus = PUBLISHED) {
  pages(
    filters: { key: { eq: "home" } }
    pagination: { limit: 1 }
    status: $status
  ) {
    documentId
    title
    description
    meta {
      ...PageMetadata
    }
    section_refs(sort: ["order:asc"]) {
      documentId
      order
      home_hero_section {
        __typename
        ...HomeHeroSection
      }
      who_we_are_section {
        __typename
        ...WhoWeAreSection
      }
      accreditation_list {
        __typename
        ...AccreditationList
      }
      what_we_do_section {
        __typename
        ...WhatWeDoSection
      }
      why_choose_us_section {
        __typename
        ...WhyChooseUsSection
      }
      how_it_works_section {
        __typename
        ...HowItWorksSection
      }
      recent_work_section {
        __typename
        ...RecentWorkSection
      }
      client_review_section {
        __typename
        ...ClientReviewSection
      }
      planning_renovation_section {
        __typename
        ...PlanningRenovationSection
      }
    }
  }
}
