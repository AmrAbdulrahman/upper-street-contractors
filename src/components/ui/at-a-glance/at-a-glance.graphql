
query GetAtAGlance($preview: Boolean = false) {
  atAGlanceCollection(limit: 1, preview: $preview) {
    items {
      _id
      sys {
        id
      }
      title
      cardsCollection(preview: $preview) {
        items {
          ...GlanceCard
        }
      }
      footer {
        json
      }
    }
  }
}