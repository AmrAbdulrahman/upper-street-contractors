query GetHomePage($preview: Boolean = false) {
  pageCollection(limit: 1, preview: $preview, where: { key: "home" }) {
    items {
      _id
      __typename
      sys {
        id
      }
      title
      description
      meta {
        ...PageMetadata
      }
      sectionsCollection(limit: 10, preview: $preview) {
        items {
          ... on HomeHeaderSection {
            ...HomeHeroSection
          }
          ... on AccreditationList {
            ...AccreditationList
          }
          ... on WhoWeAreSection {
            ...WhoWeAreSection
          }
          ... on WhatWeDoSection {
            ...WhatWeDoSection
          }
        }
      }
    }
  }
}